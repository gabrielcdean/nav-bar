<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Arial Navigation</title>
  <style>
    /* Reset & Base Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, Helvetica, sans-serif; /* Set strictly to Arial */
      background-color: transparent; /* Seamless blend into Google Sites */
    }

    /* Navbar Flex Container */
    .navbar {
      display: flex;
      justify-content: center; /* Centers navigation choices exactly like your image layout */
      align-items: center;
      background-color: #111111; /* Clean dark background */
      padding: 15px 30px;
    }

    /* Navigation Links Menu Layout */
    .nav-menu {
      display: flex;
      list-style: none;
      gap: 30px; /* Precise horizontal spacing between choices */
    }

    /* Standard Inactive Links */
    .nav-link {
      color: #ffffff; /* White text text color */
      text-decoration: none;
      font-size: 14px; /* Strictly set to 14px */
      font-weight: normal;
      padding: 5px 10px;
      transition: color 0.15s ease-in-out;
    }

    /* Hover State Change */
    .nav-link:hover {
      color: #ff9900; /* Turns orange on hover pointer interaction */
    }

    /* Current Active Selected State */
    .nav-link.active-page {
      color: #ff9900 !important; /* Locks link to orange state when current page is selected */
      font-weight: bold; 
    }

    /* Responsive Design for Mobile Devices */
    .menu-toggle {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }
    .bar {
      width: 25px;
      height: 3px;
      background-color: white;
      border-radius: 2px;
    }
    @media (max-width: 768px) {
      .navbar {
        justify-content: space-between;
      }
      .menu-toggle {
        display: flex;
      }
      .nav-menu {
        display: none;
        flex-direction: column;
        width: 100%;
        position: absolute;
        top: 50px;
        left: 0;
        background-color: #111111;
        padding: 20px;
        z-index: 1000;
        gap: 15px;
      }
      .nav-menu.active {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <!-- Hamburger icon container for mobile windows -->
    <div class="menu-toggle" id="mobile-menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <!-- Finalized Menu List structure matching your custom image links -->
    <ul class="nav-menu" id="nav-list">
      <li><a href="https://google.com" target="_top" class="nav-link">Home</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">Film</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">About</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">Schedule</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">Academics</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">Contact</a></li>
    </ul>
  </nav>

  <script>
    // Handles collapsible interaction drawer behaviors on mobile displays
    const mobileMenu = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');
    mobileMenu.addEventListener('click', () => {
      navList.classList.toggle('active');
    });

    // Detect parameter tags safely within Google iFrames to apply active colors
    const urlParams = new URLSearchParams(window.location.search);
    const activePage = urlParams.get('page');

    if (activePage) {
      const navLinks = document.querySelectorAll('.nav-link');
      navLinks.forEach(link => {
        if (link.textContent.toLowerCase() === activePage.toLowerCase()) {
          link.classList.add('active-page');
        }
      });
    }
  </script>

</body>
</html>
