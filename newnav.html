<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Arial Navbar</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, Helvetica, sans-serif; /* Updated to Arial */
      background-color: transparent;
    }

    /* Navbar Wrapper */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #1a1a1a; /* Background color of the bar */
      padding: 15px 30px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    /* Logo / Branding */
    .navbar-brand {
      color: #ffffff; /* White text */
      font-size: 14px; /* Arial 14 */
      font-weight: bold;
      text-decoration: none;
    }

    /* Navigation Links Container */
    .nav-menu {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    /* Individual Navigation Links */
    .nav-link {
      color: #ffffff; /* White text */
      text-decoration: none;
      font-size: 14px; /* Arial 14 */
      font-weight: normal;
      padding: 8px 12px;
      border-radius: 4px;
      transition: color 0.2s ease;
    }

    /* Hover effect */
    .nav-link:hover {
      color: #ff9900; /* Turns orange on hover */
    }

    /* Selected Page Class (Active state) */
    .nav-link.active-page {
      color: #ff9900 !important; /* Forces text to turn orange when selected */
      font-weight: bold; /* Optional: makes the selected link stand out more */
    }

    /* Mobile Hamburger Menu Logic */
    .menu-toggle {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }
    .bar {
      width: 25px;
      height: 3px;
      background-color: white;
      border-radius: 2px;
    }

    /* Mobile Responsive Breakdown */
    @media (max-width: 768px) {
      .menu-toggle {
        display: flex;
      }
      .nav-menu {
        display: none;
        flex-direction: column;
        width: 100%;
        position: absolute;
        top: 60px;
        left: 0;
        background-color: #1a1a1a;
        padding: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 999;
      }
      .nav-menu.active {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="https://google.com" target="_top" class="navbar-brand">MY LOGO</a>

    <div class="menu-toggle" id="mobile-menu">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>

    <ul class="nav-menu" id="nav-list">
      <li><a href="https://google.com" target="_top" class="nav-link">Home</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">About</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">Services</a></li>
      <li><a href="https://google.com" target="_top" class="nav-link">Contact</a></li>
    </ul>
  </nav>

  <script>
    // Mobile menu toggle
    const mobileMenu = document.getElementById('mobile-menu');
    const navList = document.getElementById('nav-list');
    mobileMenu.addEventListener('click', () => {
      navList.classList.toggle('active');
    });

    // Automatic "Selected Page" Detector
    // This script checks the browser URL and automatically applies the orange color to the correct link
    const currentUrl = window.top.location.href;
    const navLinks = document.querySelectorAll('.nav-link');

    navLinks.forEach(link => {
      if (currentUrl.includes(link.getAttribute('href'))) {
        link.classList.add('active-page');
      }
    });
  </script>

</body>
</html>
