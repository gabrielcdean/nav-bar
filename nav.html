<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Navigation Bar</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0b0b0d; /* deep black background */
    }

    .custom-nav {
      display: flex;
      justify-content: center;
      gap: 48px;
      padding: 24px 0;
    }

    .custom-nav a {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: #b0b0b0; /* gray text */
      text-decoration: none;
      letter-spacing: 1px;
      position: relative;
      transition: color 0.25s;
    }

    .custom-nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0%;
      height: 2px;
      background-color: #f97415;
      transition: width 0.3s ease;
    }

    .custom-nav a:hover {
      color: #f97415;
    }

    .custom-nav a:hover::after {
      width: 100%;
    }

    .custom-nav a.active {
      color: #ffffff; /* white active link */
    }

    .custom-nav a.active::after {
      width: 100%;
      background-color: #f97415; /* orange underline */
    }
  </style>
</head>

<body>
  <div class="custom-nav">
    <a href="/home" class="active">Home</a>
    <a href="/film">Film</a>
    <a href="/about">About</a>
    <a href="/schedule">Schedule</a>
    <a href="/academics">Academics</a>
    <a href="/contact">Contact</a>
  </div>
</body>
</html>
